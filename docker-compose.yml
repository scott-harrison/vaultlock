version: '3.8'

# Development: run only Postgres, then start the API with `cargo run` in backend/
# (see docs/DEV_ENVIRONMENT.md). The backend service below is for production (#8).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vaultlock
      POSTGRES_PASSWORD: vaultlock
      POSTGRES_DB: vaultlock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://vaultlock:vaultlock@postgres:5432/vaultlock
      RUST_LOG: debug
    depends_on:
      - postgres

volumes:
  postgres_data: