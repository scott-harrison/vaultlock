version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - '@biomejs/*'
          - 'husky'

  - package-ecosystem: cargo
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Major upgrades need dedicated migration PRs, not auto-bumps.
      - dependency-name: axum
        update-types: [version-update:semver-major]
      - dependency-name: tower
        update-types: [version-update:semver-major]
      - dependency-name: tower-http
        update-types: [version-update:semver-major]
      - dependency-name: rand
        update-types: [version-update:semver-major]
      - dependency-name: testcontainers
        update-types: [version-update:semver-major]
      - dependency-name: reqwest
        update-types: [version-update:semver-major]

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Tauri/wry Linux GTK stack; wait for upstream gtk-rs 0.20 migration (RUSTSEC-2024-0429).
      # glib 0.20 is a breaking gtk-rs bump — cannot patch 0.18.x in isolation.
      - dependency-name: glib
        update-types: [version-update:semver-major]
      - dependency-name: glib
        versions: ["< 0.20.0"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
