name: CI

on:
  push:
    branches: [ main, 'epic/*' ]
  pull_request:
    branches: [ main, 'epic/*' ]

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install npm dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit npm dependencies
        run: pnpm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet

      - name: Audit Rust dependencies
        working-directory: backend
        run: cargo audit

      - name: Verify Cargo.lock matches Cargo.toml
        working-directory: backend
        run: cargo metadata --locked --format-version=1 >/dev/null

  lint-and-test:
    runs-on: ubuntu-latest
    needs: supply-chain

    steps:
    - uses: actions/checkout@v5

    - name: Setup Biome
      uses: biomejs/setup-biome@v2
      with:
        version: 1.9.4

    - name: Run Biome checks
      run: biome check --diagnostic-level=error .

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: backend

    - name: Clippy
      run: cargo clippy --locked --all-targets -- -D warnings
      working-directory: backend

    - name: Run tests
      run: cargo test --locked
      working-directory: backend

  coverage:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
    - uses: actions/checkout@v5

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Generate coverage
      run: cargo tarpaulin --out Xml --output-dir coverage
      working-directory: backend

    - name: Upload coverage
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v4
      with:
        files: backend/coverage/cobertura.xml
        token: ${{ env.CODECOV_TOKEN }}
        fail_ci_if_error: true