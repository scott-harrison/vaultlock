name: CI

on:
  push:
    branches: [ main, 'epic/*' ]
  pull_request:
    branches: [ main, 'epic/*' ]

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install npm dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit npm dependencies
        run: pnpm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend
            desktop/src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet

      - name: Audit Rust dependencies (backend)
        working-directory: backend
        run: cargo audit

      - name: Audit Rust dependencies (desktop)
        working-directory: desktop/src-tauri
        run: cargo audit

      # Lockfile consistency (supply-chain hygiene).
      #
      # - Normal PRs, human contributors, and pushes to main: HARD FAIL if Cargo.lock
      #   does not match Cargo.toml. Forces `cargo check` (or `cargo build`/`cargo update`)
      #   before the push.
      # - Dependabot PRs (github.actor == dependabot[bot] or head_ref starts with "dependabot/"):
      #   emit a clear ::warning:: but SUCCEED the step. This directly addresses the failure
      #   class seen in PR #160 (sqlx 0.9.0 Dependabot bump + subsequent code fix that updated
      #   Cargo.toml again without the lockfile). The rest of CI (lint-and-test, coverage) and
      #   human review can proceed; the lockfile just needs to be regenerated before merge.
      - name: Verify Cargo.lock matches Cargo.toml
        working-directory: backend
        run: |
          if cargo metadata --locked --format-version=1 >/dev/null 2>&1; then
            echo "✅ Cargo.lock is consistent with Cargo.toml"
          elif [[ "${{ github.actor }}" == "dependabot[bot]" || "${{ github.head_ref }}" == dependabot/* ]]; then
            echo "::warning title=Cargo.lock out of sync (Dependabot)::Dependabot PRs commonly touch Cargo.toml (manifest bump or post-fix edit) before Cargo.lock is in sync. To fix before merge: cd backend && cargo update -p <pkg> --precise <ver> && git add Cargo.lock && git push. This step passes with warning so lint/test jobs are not blocked."
          else
            echo "::error title=Stale Cargo.lock::Cargo.lock does not match Cargo.toml. Run 'cd backend && cargo check' (or cargo build) locally to regenerate the lockfile, then commit + push. Strict enforcement for human contributors and main branch."
            exit 1
          fi

  lint-and-test:
    runs-on: ubuntu-latest
    needs: supply-chain

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vaultlock
          POSTGRES_PASSWORD: vaultlock
          POSTGRES_DB: vaultlock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaultlock -d vaultlock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://vaultlock:vaultlock@127.0.0.1:5432/vaultlock

    steps:
    - uses: actions/checkout@v6

    - name: Setup Biome
      uses: biomejs/setup-biome@v2
      with:
        version: 1.9.4

    - name: Run Biome checks
      run: biome check --diagnostic-level=error .

    - name: Check pinned dependency versions
      run: node scripts/check-pinned-deps.mjs

    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install npm dependencies (frozen lockfile)
      run: pnpm install --frozen-lockfile

    - name: Run shared package tests
      run: pnpm --filter @vaultlock/shared test

    - name: Run extension unit tests
      run: pnpm --filter @vaultlock/extension test

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: backend

    - name: Clippy
      run: cargo clippy --locked --all-targets -- -D warnings
      working-directory: backend

    - name: Run tests
      run: cargo test --locked
      working-directory: backend

  coverage:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      TEST_DATABASE_URL: postgres://vaultlock:vaultlock@127.0.0.1:5432/vaultlock

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vaultlock
          POSTGRES_PASSWORD: vaultlock
          POSTGRES_DB: vaultlock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaultlock -d vaultlock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Generate coverage
      run: cargo tarpaulin --out Xml --output-dir coverage
      working-directory: backend

    - name: Upload coverage
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v7
      with:
        files: backend/coverage/cobertura.xml
        token: ${{ env.CODECOV_TOKEN }}
        fail_ci_if_error: true

  extension-e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install npm dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build extension for E2E
        run: pnpm extension:build

      - name: Install Playwright Chromium
        run: pnpm --filter @vaultlock/extension test:e2e:install

      - name: Run extension Phase 1 E2E smoke tests
        run: xvfb-run -a pnpm extension:test:e2e