packages:
  - 'frontend'
  - 'mobile'
  - 'extension'
  - 'shared'
  - 'desktop'
  - 'ui'

# Supply chain: https://pnpm.io/supply-chain-security
blockExoticSubdeps: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade

# Recommended dev pin (.nvmrc); engines allow any 24.x LTS patch.
nodeVersion: 24.15.0
engineStrict: true

allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
overrides:
  # Exact targets match pnpm-lock.yaml resolutions (security floors from prior ^ overrides).
  semver@<7: 7.8.0
  # Security floor for 2.16.x only; do not bump Plasmo's Parcel 2.9.3 stack (2.9.3 < 2.16.0).
  '@parcel/reporter-dev-server@>=2.16.0 <2.16.4': 2.16.4
  '@xmldom/xmldom@<0.8.12': 0.8.13
  '@xmldom/xmldom@<0.8.13': 0.8.13
  content-security-policy-parser@<0.6.0: 0.6.0
  esbuild@<=0.24.2: 0.25.12
  fast-xml-parser@<5.7.0: 5.8.0
  msgpackr@<1.10.1: 1.11.12
  postcss@<8.5.10: 8.5.14
  send@<0.19.0: 0.19.2
  svelte@<4.2.19: 4.2.19
  svelte@<=5.51.4: 5.55.8
  svelte@<=5.53.4: 5.55.8
  svelte@<=5.55.6: 5.55.8
  tar@<7.5.7: 7.5.15
  tar@<7.5.8: 7.5.15
  tar@<=7.5.10: 7.5.15
  tar@<=7.5.2: 7.5.15
  tar@<=7.5.3: 7.5.15
  tar@<=7.5.9: 7.5.15
  tmp@<0.2.6: 0.2.6
  uuid@<11.1.1: 11.1.1
  vitest@<4.1.0: 4.1.0
  tsup@<=8.3.4: 8.5.1
  vite@<=6.4.1: 6.4.2
  ws@>=8.0.0 <8.20.1: 8.20.1
