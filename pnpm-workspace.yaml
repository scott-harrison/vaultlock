packages:
  - 'frontend'
  - 'mobile'
  - 'extension'

# Supply chain: https://pnpm.io/supply-chain-security
blockExoticSubdeps: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade

allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
overrides:
  '@parcel/reporter-dev-server@>=1.6.1 <=2.16.3': ^2.16.4
  '@xmldom/xmldom@<0.8.12': ^0.8.12
  '@xmldom/xmldom@<0.8.13': ^0.8.13
  content-security-policy-parser@<0.6.0: ^0.6.0
  esbuild@<=0.24.2: ^0.24.3
  fast-xml-parser@<5.7.0: ^5.7.0
  msgpackr@<1.10.1: ^1.10.1
  postcss@<8.5.10: ^8.5.10
  send@<0.19.0: ^0.19.0
  svelte@<4.2.19: ^4.2.19
  svelte@<=5.51.4: ^5.51.5
  svelte@<=5.53.4: ^5.53.5
  svelte@<=5.55.6: ^5.55.7
  tar@<7.5.7: ^7.5.7
  tar@<7.5.8: ^7.5.8
  tar@<=7.5.10: ^7.5.11
  tar@<=7.5.2: ^7.5.3
