<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultLock E2E Login Form</title>
  </head>
  <body>
    <main>
      <h1>Sign in</h1>
      <form id="login-form" action="/submit" method="post">
        <label>
          Email
          <input id="username" name="email" type="email" autocomplete="username" />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" />
        </label>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
