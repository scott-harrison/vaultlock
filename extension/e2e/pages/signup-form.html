<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultLock E2E Signup Form</title>
  </head>
  <body>
    <main>
      <h1>Create account</h1>
      <form id="signup-form" action="/register" method="post">
        <label>
          Email
          <input id="email" name="email" type="email" autocomplete="username" />
        </label>
        <label>
          New password
          <input
            id="new-password"
            name="new-password"
            type="password"
            autocomplete="new-password"
          />
        </label>
        <label>
          Confirm password
          <input
            id="confirm-password"
            name="confirm-password"
            type="password"
            autocomplete="new-password"
          />
        </label>
        <button type="submit">Create account</button>
      </form>
    </main>
  </body>
</html>
