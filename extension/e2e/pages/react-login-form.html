<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>React-like login validation</title>
  </head>
  <body>
    <main>
      <h1>Sign in</h1>
      <form id="login-form">
        <label>
          Email
          <input id="email" name="email" type="email" autocomplete="username" value="" />
        </label>
        <button id="continue" type="button" disabled>Continue</button>
      </form>
    </main>
    <script>
      const input = document.getElementById("email");
      const button = document.getElementById("continue");

      input.addEventListener("input", () => {
        const value = input.value.trim();
        button.disabled = !value.includes("@") || value.length < 5;
      });
    </script>
  </body>
</html>
