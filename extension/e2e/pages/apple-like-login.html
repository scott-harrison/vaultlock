<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Apple-like sign in</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 48px auto;
        max-width: 420px;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border: 1px solid #d2d2d7;
        border-radius: 10px;
        font-size: 16px;
      }

      button {
        padding: 12px 16px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
        background: #0071e3;
        color: #fff;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .honeypot {
        position: absolute;
        left: -9999px;
        width: 320px;
        height: 44px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <h1>Sign in to Apple Developer</h1>
    <form>
      <input
        id="account_name_text_field"
        type="text"
        name="accountName"
        autocomplete="username"
        placeholder="Email or Phone Number"
      />
      <button id="sign-in" type="button" disabled>Continue</button>
      <div style="pointer-events: none">
        <input
          id="password_text_field"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="Password"
          tabindex="-1"
          aria-hidden="true"
        />
      </div>
      <input
        class="honeypot"
        type="email"
        name="secondary-email"
        tabindex="-1"
        aria-hidden="true"
        autocomplete="off"
      />
    </form>
    <script>
      const input = document.getElementById("account_name_text_field");
      const button = document.getElementById("sign-in");

      input.addEventListener("input", (event) => {
        if (!event.isTrusted) {
          return;
        }

        const value = input.value.trim();
        button.disabled = !value.includes("@") || value.length < 5;
      });
    </script>
  </body>
</html>
