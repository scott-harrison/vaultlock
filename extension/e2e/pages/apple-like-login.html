<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Apple-like sign in</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 48px auto;
        max-width: 420px;
      }

      .field {
        position: relative;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border: 1px solid #d2d2d7;
        border-radius: 10px;
        font-size: 16px;
      }

      .honeypot {
        position: absolute;
        left: -9999px;
        width: 320px;
        height: 44px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <h1>Sign in to Apple Developer</h1>
    <form>
      <div class="field">
        <input
          id="account_name_text_field"
          type="text"
          name="accountName"
          autocomplete="username"
          placeholder="Email or Phone Number"
        />
      </div>
      <input
        class="honeypot"
        type="email"
        name="secondary-email"
        tabindex="-1"
        aria-hidden="true"
        autocomplete="off"
      />
    </form>
  </body>
</html>
